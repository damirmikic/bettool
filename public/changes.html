<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetTool Changes</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav class="topbar">
      <div class="topbar__brand">
        <span class="topbar__logo">◆</span>
        <span class="topbar__name">BetTool Changes</span>
      </div>

      <a class="topbar__link" href="/">Odds</a>
      <a class="topbar__link" href="/value.html">Value</a>
      <a class="topbar__link topbar__link--active" href="/changes.html">Changes</a>
      <a class="topbar__link" href="/admin.html">Admin</a>

      <div class="topbar__search">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8.5" cy="8.5" r="5.5"></circle>
          <path d="M15 15l-3-3"></path>
        </svg>
        <input id="changes-search-input" type="search" placeholder="Search teams or leagues..." autocomplete="off" />
      </div>

      <div class="topbar__stats">
        <div class="stat">
          <span class="stat__label">Matches</span>
          <strong class="stat__value" id="changes-match-count">-</strong>
        </div>
        <div class="stat stat--arb">
          <span class="stat__label">Outcomes</span>
          <strong class="stat__value" id="changes-outcome-count">-</strong>
        </div>
      </div>

      <button id="changes-refresh-button" class="btn-refresh" type="button">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M4 4a8 8 0 0112.94 3"></path>
          <path d="M16 16a8 8 0 01-12.94-3"></path>
          <polyline points="1 4 4 4 4 7"></polyline>
          <polyline points="19 16 16 16 16 13"></polyline>
        </svg>
        Refresh
      </button>
    </nav>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__header">
          <span class="sidebar__title">Changed Competitions</span>
          <button id="changes-all-button" class="sidebar__reset is-active" type="button">
            All changes
          </button>
        </div>

        <div id="changes-country-tree" class="country-tree" aria-label="Countries and leagues"></div>
      </aside>

      <section class="content">
        <div class="controlbar">
          <div class="controlbar__right">
            <label class="ctrl-field">
              <span>Sort</span>
              <select id="changes-sort-select">
                <option value="recent">Most changed</option>
                <option value="start">Kickoff</option>
              </select>
            </label>
            <label class="ctrl-field">
              <span>Rows</span>
              <select id="changes-limit-select">
                <option value="25">25</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="all">All</option>
              </select>
            </label>
          </div>
        </div>

        <div class="statusbar">
          <span id="changes-results-summary">Loading changes...</span>
          <span id="changes-generated-at"></span>
        </div>

        <div id="changes-selection-bar" class="selection-bar" hidden>
          <div class="selection-bar__copy">
            <span id="changes-selection-kicker" class="selection-bar__kicker"></span>
            <strong id="changes-selection-title" class="selection-bar__title"></strong>
          </div>
          <button id="changes-clear-selection-button" class="selection-bar__clear" type="button">
            Clear
          </button>
        </div>

        <main id="changes-results" class="value-list" aria-live="polite"></main>
      </section>
    </div>

    <template id="changes-card-template">
      <article class="value-card">
        <div class="value-card__head">
          <div class="value-card__title-group">
            <span class="value-card__time"></span>
            <strong class="value-card__teams"></strong>
          </div>
          <div class="value-card__tags">
            <button class="match-row__country changes-card__country" type="button"></button>
            <button class="match-row__league changes-card__league" type="button"></button>
            <span class="badge badge--edge changes-card__badge"></span>
          </div>
        </div>

        <table class="value-grid">
          <thead>
            <tr>
              <th>Outcome</th>
              <th>Merkur</th>
              <th>Pinnacle</th>
              <th>Best</th>
              <th>No-Vig</th>
              <th>Value %</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </article>
    </template>

    <script type="module" src="/changes.js"></script>
  </body>
</html>
